<meta charset="UTF-8">

<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=Archivo+Narrow:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0d0f;--surface:#141618;--border:#222428;
  --text:#eceef2;--muted:#5a5e68;
  --sans:'Archivo',sans-serif;--narrow:'Archivo Narrow',sans-serif;
}
html{height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 20px;-webkit-font-smoothing:antialiased}

/* ── SELECTOR IDIOMA ── */
.lang-bar{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:28px;width:100%;max-width:380px}
.lang-btn{padding:5px 10px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--muted);font-family:var(--narrow);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.lang-btn:hover{border-color:#3b82f6;color:#3b82f6}
.lang-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}

/* ── FORMULARIO ── */
#screen-form{width:100%;max-width:380px;animation:fadeUp .4s cubic-bezier(.22,1,.36,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
.form-header{margin-bottom:28px}
.form-eyebrow{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.pulse-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(34,197,94,.4)}50%{opacity:.7;box-shadow:0 0 0 6px rgba(34,197,94,0)}}
.form-eyebrow span{font-family:var(--narrow);font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:#22c55e}
.form-title{font-size:30px;font-weight:900;letter-spacing:-.5px;line-height:1.05;color:var(--text)}
.form-title em{font-style:normal;color:var(--muted);display:block;font-weight:400;font-size:14px;letter-spacing:0;line-height:1.4;margin-top:8px}
.field{margin-bottom:14px}
.field label{display:block;font-family:var(--narrow);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.tel-wrap{display:flex;gap:8px}
.prefix-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 14px;font-family:var(--narrow);font-size:18px;font-weight:700;color:var(--muted);white-space:nowrap;flex-shrink:0;min-width:72px;text-align:center;transition:border-color .2s}
.field input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 18px;font-family:var(--narrow);font-size:22px;font-weight:700;letter-spacing:.06em;color:var(--text);outline:none;-webkit-appearance:none;transition:border-color .2s,box-shadow .2s;caret-color:#3b82f6}
.field input::placeholder{color:#2a2d34;font-weight:400}
.field input:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.tel-input{flex:1}
.field-hint{margin-top:5px;font-size:12px;color:var(--muted);font-weight:400}
.btn-submit{width:100%;margin-top:6px;padding:17px;background:#3b82f6;color:#fff;border:none;border-radius:10px;font-family:var(--narrow);font-size:15px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:background .15s,transform .1s}
.btn-submit:hover{background:#2563eb}.btn-submit:active{transform:scale(.99)}.btn-submit:disabled{background:#1e2128;color:var(--muted);cursor:not-allowed}
.spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.form-error{margin-top:12px;padding:11px 14px;background:rgba(239,68,68,.07);border:1px solid rgba(239,68,68,.2);border-radius:8px;font-size:13px;color:#f87171;display:none}

/* ── ESTADO ── */
#screen-estado{display:none;width:100%;max-width:420px;text-align:center;animation:fadeUp .5s cubic-bezier(.22,1,.36,1) both}
.estado-mat{font-family:var(--narrow);font-size:13px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-bottom:28px}
.estado-card{border-radius:20px;border:1px solid var(--border);padding:40px 28px 36px;position:relative;overflow:hidden;transition:background .6s,border-color .6s}
.estado-card.waiting{background:var(--surface);border-color:var(--border)}
.estado-card.verde{background:#052e16;border-color:#166534}
.estado-card.naranja{background:#1c0a00;border-color:#92400e}
.estado-card.rojo{background:#1c0506;border-color:#991b1b}
.estado-icon{font-size:64px;line-height:1;margin-bottom:20px;display:block;transition:transform .4s cubic-bezier(.34,1.56,.64,1)}
.estado-card.resolved .estado-icon{animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.estado-titulo{font-size:24px;font-weight:900;letter-spacing:-.3px;line-height:1.1;margin-bottom:10px;transition:color .4s}
.waiting .estado-titulo{color:var(--muted)}
.verde .estado-titulo{color:#4ade80}
.naranja .estado-titulo{color:#fbbf24}
.rojo .estado-titulo{color:#f87171}
.estado-desc{font-size:15px;font-weight:400;line-height:1.55;color:var(--muted);transition:color .4s}
.verde .estado-desc{color:#86efac}
.naranja .estado-desc{color:#fde68a}
.rojo .estado-desc{color:#fca5a5}
.hora-badge{display:inline-block;margin-top:16px;font-family:var(--narrow);font-size:28px;font-weight:900;letter-spacing:.04em;color:#f87171;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);border-radius:10px;padding:8px 22px}
.waiting-dots{display:flex;justify-content:center;gap:6px;margin:20px 0 0}
.waiting-dots span{width:7px;height:7px;background:var(--border);border-radius:50%;animation:dotPulse 1.4s ease-in-out infinite}
.waiting-dots span:nth-child(2){animation-delay:.2s}
.waiting-dots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,80%,100%{transform:scale(.8);opacity:.4}40%{transform:scale(1.2);opacity:1}}
.waiting .waiting-dots{display:flex}.resolved .waiting-dots{display:none}
.estado-footer{margin-top:24px;font-size:12px;color:#2a2d34;font-family:var(--narrow);letter-spacing:.04em}
.estado-topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.conexion-pill{display:flex;align-items:center;gap:5px;font-family:var(--narrow);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#22c55e}
.conexion-dot{width:5px;height:5px;background:#22c55e;border-radius:50%;animation:pulse 2s ease-in-out infinite}
.estado-num-label{font-family:var(--narrow);font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
</style>
</head>

<!-- FORMULARIO -->
<div id="screen-form">

  </div>

  <div class="field">
    <label id="lbl-mat">Matrícula del vehículo</label>
    <input type="text" id="inp-mat" placeholder="1234ABC" maxlength="12"
      autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false" inputmode="text">
    <div class="field-hint" id="hint-mat">Matrícula del camión o semirremolque</div>
  </div>

  <div class="field">
    <label id="lbl-tel">Teléfono móvil</label>
    <div class="tel-wrap">
      <div class="prefix-box" id="prefix-box">+34</div>
      <input type="tel" id="inp-tel" placeholder="612 000 000"
        maxlength="13" autocomplete="tel" inputmode="tel" class="tel-input">
    </div>
    <div class="field-hint" id="hint-tel">Solo para identificarte, no recibirás llamadas</div>
  </div>

  <div class="form-error" id="form-err"></div>

  <button class="btn-submit" id="btn-reg" onclick="registrar()">
    <div class="spinner" id="spinner"></div>
    <span id="btn-txt">Registrar y ver estado</span>
  </button>
</div>

<!-- ESTADO EN TIEMPO REAL -->
<div id="screen-estado">

      <span id="txt-endirecto">En directo</span>
    </div>
    <div class="estado-num-label" id="estado-mat-top">—</div>
  </div>

  <div class="estado-card waiting" id="estado-card">
    <span class="estado-icon" id="estado-icon">⏳</span>
    <div class="estado-titulo" id="estado-titulo"></div>
    <div class="estado-desc"   id="estado-desc"></div>
    <div class="hora-badge"    id="hora-badge" style="display:none"></div>
    <div class="waiting-dots"><span></span><span></span><span></span></div>
  </div>

  <div class="estado-footer" id="txt-footer">No cierres esta página · Se actualiza sola</div>
</div>

// ── CAMBIAR IDIOMA ──
function setLang(lang) {
  idiomaActual = lang;
  const t = T[lang];

  // Botones
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');

  // Formulario
  document.getElementById('txt-activo').textContent    = t.activo;
  document.getElementById('txt-titulo').textContent    = t.titulo;
  document.getElementById('txt-subtitulo').textContent = t.subtitulo;
  document.getElementById('lbl-mat').textContent       = t.lbl_mat;
  document.getElementById('hint-mat').textContent      = t.hint_mat;
  document.getElementById('lbl-tel').textContent       = t.lbl_tel;
  document.getElementById('hint-tel').textContent      = t.hint_tel;
  document.getElementById('btn-txt').textContent       = t.btn;
  document.getElementById('prefix-box').textContent    = t.prefix;

  // Estado (si ya está mostrándose)
  document.getElementById('txt-endirecto').textContent = t.endirecto;
  document.getElementById('txt-footer').textContent    = t.footer;

  // Si está en pantalla de espera, actualizar textos
  const card = document.getElementById('estado-card');
  if (card.classList.contains('waiting')) {
    document.getElementById('estado-titulo').textContent = t.esperando_titulo;
    document.getElementById('estado-desc').textContent   = t.esperando_desc;
  }
}

// ── INPUTS ──
document.getElementById('inp-mat').addEventListener('input', function() {
  this.value = this.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
});
document.getElementById('inp-tel').addEventListener('input', function() {
  this.value = this.value.replace(/[^0-9\s]/g, '');
});
document.addEventListener('keydown', e => { if (e.key === 'Enter') registrar(); });

// ── REGISTRAR ──
async function registrar() {
  const t   = T[idiomaActual];
  const mat = document.getElementById('inp-mat').value.trim();
  const tel = document.getElementById('inp-tel').value.trim().replace(/\s/g, '');
  const errEl = document.getElementById('form-err');
  errEl.style.display = 'none';

  if (mat.length < 4) { mostrarError(t.err_mat); return; }
  if (tel.replace(/[^0-9]/g, '').length < 7) { mostrarError(t.err_tel); return; }

  const telefono = T[idiomaActual].prefix + tel;

  setLoading(true);

  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/despachos`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': ANON_KEY,
        'Authorization': `Bearer ${ANON_KEY}`,
        'Prefer': 'return=representation'
      },
      body: JSON.stringify({ matricula: mat, telefono, hora_entrada: new Date().toISOString() })
    });

    if (!res.ok) throw new Error();
    const data = await res.json();
    despachoId = data[0]?.id;
    if (!despachoId) throw new Error();

    // Mostrar pantalla de estado
    document.getElementById('lang-bar').style.display      = 'none';
    document.getElementById('screen-form').style.display   = 'none';
    document.getElementById('screen-estado').style.display = 'block';
    document.getElementById('estado-mat-top').textContent  = mat;
    document.getElementById('estado-titulo').textContent   = t.esperando_titulo;
    document.getElementById('estado-desc').textContent     = t.esperando_desc;

    suscribirEstado(despachoId);

  } catch {
    mostrarError(t.err_gen);
  } finally {
    setLoading(false);
  }
}

// ── REALTIME ──
function suscribirEstado(id) {
  suscripcion = sb.channel(`despacho-${id}`)
    .on('postgres_changes', {
      event: 'UPDATE', schema: 'public', table: 'despachos', filter: `id=eq.${id}`
    }, payload => {
      actualizarPantalla(payload.new);
    })
    .subscribe();
}

// ── ACTUALIZAR PANTALLA ──
function actualizarPantalla(despacho) {
  const c = despacho.circuito;
  if (!c) return;
  const t = T[idiomaActual];

  const card    = document.getElementById('estado-card');
  const icon    = document.getElementById('estado-icon');
  const titulo  = document.getElementById('estado-titulo');
  const desc    = document.getElementById('estado-desc');
  const horaBdg = document.getElementById('hora-badge');

  card.classList.remove('waiting', 'verde', 'naranja', 'rojo');
  card.classList.add('resolved');
  horaBdg.style.display = 'none';

  if (c === 'verde') {
    card.classList.add('verde');
    icon.textContent  = '✅';
    titulo.textContent = t.verde_titulo;
    desc.textContent  = t.verde_desc;
  } else if (c === 'naranja') {
    card.classList.add('naranja');
    icon.textContent  = '⏳';
    titulo.textContent = t.naranja_titulo;
    desc.textContent  = t.naranja_desc;
  } else if (c?.startsWith('rojo')) {
    const hora = c.split('-')[1] + ':00h';
    card.classList.add('rojo');
    icon.textContent  = '🔴';
    titulo.textContent = t.rojo_titulo;
    desc.textContent  = t.rojo_desc;
    horaBdg.textContent   = hora;
    horaBdg.style.display = 'inline-block';
  }

  if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
}

// ── HELPERS ──
function mostrarError(msg) {
  const e = document.getElementById('form-err');
  e.textContent = msg; e.style.display = 'block';
}

function setLoading(on) {
  document.getElementById('btn-reg').disabled = on;
  document.getElementById('spinner').style.display = on ? 'block' : 'none';
  const t = T[idiomaActual];
  document.getElementById('btn-txt').textContent = on ? t.registrando : t.btn;
}
