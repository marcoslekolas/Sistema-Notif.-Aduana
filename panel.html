<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel · Despachos Aduaneros</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=Archivo+Narrow:wght@400;500;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f4f2ee;
  --surface: #ffffff;
  --border:  #e2dfd8;
  --border2: #eeebe5;
  --text:    #1a1816;
  --muted:   #8a8480;
  --sans:    'Archivo', sans-serif;
  --narrow:  'Archivo Narrow', sans-serif;

  --v:    #15803d; --vbg: #f0fdf4; --vbd: #bbf7d0;
  --n:    #b45309; --nbg: #fffbeb; --nbd: #fde68a;
  --r:    #b91c1c; --rbg: #fff1f2; --rbd: #fecdd3;
  --p:    #4338ca; --pbg: #eef2ff; --pbd: #c7d2fe;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  -webkit-font-smoothing: antialiased;
}

/* ── TOPBAR ── */
.topbar {
  background: var(--text);
  height: 52px;
  display: flex; align-items: center;
  padding: 0 28px;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 100;
}

.tb-left { display: flex; align-items: center; gap: 20px; }

.tb-logo {
  font-family: var(--narrow);
  font-size: 16px; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
  color: #f0ede6;
}

.tb-sep { width: 1px; height: 18px; background: #303030; }

.tb-sub {
  font-family: var(--narrow);
  font-size: 11px; font-weight: 600;
  letter-spacing: .14em; text-transform: uppercase;
  color: #555;
}

.tb-right { display: flex; align-items: center; gap: 20px; }

.live-badge {
  display: flex; align-items: center; gap: 6px;
  font-family: var(--narrow);
  font-size: 10px; font-weight: 700;
  letter-spacing: .14em; text-transform: uppercase;
  color: #4ade80;
}

.ldot {
  width: 6px; height: 6px;
  background: #4ade80; border-radius: 50%;
  animation: blink 1.8s ease-in-out infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.clock {
  font-family: var(--narrow);
  font-size: 13px; font-weight: 600;
  letter-spacing: .04em;
  color: #444;
}

/* ── STATS ── */
.statsbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
}

.stat {
  flex: 1;
  padding: 14px 20px;
  border-right: 1px solid var(--border2);
  display: flex; align-items: center; gap: 12px;
}

.stat:last-child { border-right: none; }

.stat-stripe {
  width: 3px; height: 34px;
  border-radius: 2px; flex-shrink: 0;
}

.stat-num {
  font-size: 30px; font-weight: 900;
  letter-spacing: -.5px; line-height: 1; display: block;
}

.stat-lbl {
  font-family: var(--narrow);
  font-size: 10px; font-weight: 700;
  letter-spacing: .1em; text-transform: uppercase;
  color: var(--muted); display: block; margin-top: 2px;
}

/* ── MAIN ── */
main { flex: 1; padding: 20px 28px; }

.toolbar {
  display: flex; align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}

.toolbar-left {
  display: flex; align-items: center; gap: 10px;
}

.toolbar-title {
  font-family: var(--narrow);
  font-size: 12px; font-weight: 700;
  letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted);
}

.count-bubble {
  background: var(--text); color: var(--bg);
  font-family: var(--narrow); font-size: 10px; font-weight: 700;
  padding: 2px 8px; border-radius: 4px;
}

.filters { display: flex; gap: 4px; }

.fb {
  padding: 5px 13px;
  border: 1px solid var(--border); border-radius: 4px;
  background: var(--surface);
  font-family: var(--narrow); font-size: 11px; font-weight: 700;
  letter-spacing: .06em; text-transform: uppercase;
  color: var(--muted); cursor: pointer;
  transition: all .12s;
}

.fb:hover { background: var(--bg); color: var(--text); }
.fb.on { background: var(--text); color: var(--bg); border-color: var(--text); }

/* ── TABLE ── */
.tbl-wrap {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px; overflow: hidden;
}

table { width: 100%; border-collapse: collapse; }

thead th {
  padding: 9px 16px;
  font-family: var(--narrow); font-size: 9px; font-weight: 700;
  letter-spacing: .18em; text-transform: uppercase;
  color: var(--muted); background: var(--bg);
  border-bottom: 1px solid var(--border);
  text-align: left; white-space: nowrap;
}

tbody tr {
  border-bottom: 1px solid var(--border2);
  transition: background .1s;
}

tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: #faf8f4; }

td { padding: 13px 16px; vertical-align: middle; }

.td-mat {
  font-family: var(--narrow);
  font-size: 19px; font-weight: 700;
  letter-spacing: .06em;
}

.td-tel {
  font-family: var(--narrow);
  font-size: 13px; color: var(--muted); font-weight: 500;
}

.td-hora {
  font-family: var(--narrow);
  font-size: 12px; color: var(--muted); font-weight: 600;
  letter-spacing: .03em;
}

/* ── CIRCUITO BADGES ── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 4px;
  font-family: var(--narrow); font-size: 11px; font-weight: 700;
  letter-spacing: .07em; text-transform: uppercase;
  border: 1px solid; white-space: nowrap;
}

.bp { color:var(--p); background:var(--pbg); border-color:var(--pbd); }
.bv { color:var(--v); background:var(--vbg); border-color:var(--vbd); }
.bn { color:var(--n); background:var(--nbg); border-color:var(--nbd); }
.br { color:var(--r); background:var(--rbg); border-color:var(--rbd); }

/* Indicador "viendo" - conductor tiene la pantalla abierta */
.viendo-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-family: var(--narrow); font-size: 9px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: #22c55e; margin-left: 7px;
}

.viendo-dot {
  width: 5px; height: 5px; background: #22c55e; border-radius: 50%;
  animation: blink 1.8s ease-in-out infinite;
}

/* ── ACCIONES ── */
.acts { display: flex; align-items: center; gap: 5px; }

.ab {
  padding: 5px 11px; border-radius: 4px; border: 1px solid;
  font-family: var(--narrow); font-size: 11px; font-weight: 700;
  letter-spacing: .05em; text-transform: uppercase;
  cursor: pointer; transition: filter .12s, transform .1s; white-space: nowrap;
}

.ab:hover { filter: brightness(.9); }
.ab:active { transform: scale(.97); }

.ab-v { color:var(--v); background:var(--vbg); border-color:var(--vbd); }
.ab-n { color:var(--n); background:var(--nbg); border-color:var(--nbd); }
.ab-r { color:var(--r); background:var(--rbg); border-color:var(--rbd); }

/* Dropdown rojo */
.rwrap { position: relative; }

.rdrop {
  display: none; position: absolute;
  top: calc(100% + 5px); right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; box-shadow: 0 8px 24px rgba(0,0,0,.1);
  z-index: 50; min-width: 170px; overflow: hidden;
}

.rdrop.open { display: block; }

.ri {
  padding: 10px 14px;
  font-family: var(--narrow); font-size: 13px; font-weight: 600;
  cursor: pointer; color: var(--r);
  display: flex; align-items: center; gap: 10px;
  transition: background .1s;
}

.ri:hover { background: var(--rbg); }
.ri .rh { font-size: 15px; font-weight: 700; }

/* Enviando… */
.snd {
  font-family: var(--narrow); font-size: 10px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
  color: var(--muted); opacity: 0; transition: opacity .2s; white-space: nowrap;
}

.snd.show { opacity: 1; }

/* Empty state */
.empty {
  padding: 56px 24px; text-align: center; color: var(--muted);
  font-family: var(--narrow); font-size: 13px; font-weight: 700;
  letter-spacing: .08em; text-transform: uppercase;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--text); color: #f0ede6;
  font-family: var(--narrow); font-size: 12px; font-weight: 700;
  letter-spacing: .04em;
  padding: 11px 18px; border-radius: 6px;
  box-shadow: 0 8px 24px rgba(0,0,0,.18);
  transform: translateY(60px); opacity: 0;
  transition: all .28s cubic-bezier(.34,1.56,.64,1);
  z-index: 200; max-width: 320px;
}

.toast.show { transform: translateY(0); opacity: 1; }
.toast.err  { background: #991b1b; }
.toast.ok   { background: #166534; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="tb-left">
    <span class="tb-logo">Despachos Aduaneros</span>
    <div class="tb-sep"></div>
    <span class="tb-sub">Panel de gestión</span>
  </div>
  <div class="tb-right">
    <div class="live-badge"><div class="ldot"></div>Tiempo real</div>
    <div class="clock" id="clock">—</div>
  </div>
</div>

<!-- STATS -->
<div class="statsbar">
  <div class="stat">
    <div class="stat-stripe" style="background:var(--text)"></div>
    <div>
      <span class="stat-num" id="s-tot">0</span>
      <span class="stat-lbl">Total hoy</span>
    </div>
  </div>
  <div class="stat">
    <div class="stat-stripe" style="background:var(--p)"></div>
    <div>
      <span class="stat-num" style="color:var(--p)" id="s-pen">0</span>
      <span class="stat-lbl">Pendientes</span>
    </div>
  </div>
  <div class="stat">
    <div class="stat-stripe" style="background:var(--v)"></div>
    <div>
      <span class="stat-num" style="color:var(--v)" id="s-ver">0</span>
      <span class="stat-lbl">Verde · Despachado</span>
    </div>
  </div>
  <div class="stat">
    <div class="stat-stripe" style="background:var(--n)"></div>
    <div>
      <span class="stat-num" style="color:var(--n)" id="s-nar">0</span>
      <span class="stat-lbl">Naranja · Admin</span>
    </div>
  </div>
  <div class="stat">
    <div class="stat-stripe" style="background:var(--r)"></div>
    <div>
      <span class="stat-num" style="color:var(--r)" id="s-roj">0</span>
      <span class="stat-lbl">Rojo · Inspección</span>
    </div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">Vehículos del día</span>
      <span class="count-bubble" id="cnt">0</span>
    </div>
    <div class="filters">
      <button class="fb on"  onclick="setFiltro('todos',this)">Todos</button>
      <button class="fb"     onclick="setFiltro('pendiente',this)">Pendientes</button>
      <button class="fb"     onclick="setFiltro('verde',this)">Verde</button>
      <button class="fb"     onclick="setFiltro('naranja',this)">Naranja</button>
      <button class="fb"     onclick="setFiltro('rojo',this)">Rojo</button>
    </div>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Matrícula</th>
          <th>Teléfono</th>
          <th>Entrada</th>
          <th>Circuito</th>
          <th>Asignar circuito</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
// ─── CONFIGURACIÓN ────────────────────────────────────────────
const SUPABASE_URL = 'https://aidkhuhthxtgwseqxejq.supabase.co';
const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpZGtodWh0aHh0Z3dzZXF4ZWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTcwMDQsImV4cCI6MjA5MTIzMzAwNH0.9rMXoYgd9OzGYw7mPtRbuPtHZOjubMc8kZ0mSvawUyM';
// ─────────────────────────────────────────────────────────────

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, ANON_KEY);

let rows = [], filtro = 'todos', openDrop = null;

// Reloj
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-ES', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}, 1000);

// ── CARGA + REALTIME ──
async function load() {
  const hoy = new Date().toISOString().split('T')[0];
  const { data } = await sb
    .from('despachos')
    .select('*')
    .gte('hora_entrada', `${hoy}T00:00:00`)
    .order('hora_entrada', { ascending: false });
  rows = data || [];
  render();
}

// Suscribirse - funciona para todos los paneles abiertos simultáneamente
sb.channel('panel-rt')
  .on('postgres_changes', { event: '*', schema: 'public', table: 'despachos' }, load)
  .subscribe();

load();

// ── RENDER ──
function render() {
  const list =
    filtro === 'todos'     ? rows :
    filtro === 'pendiente' ? rows.filter(r => !r.circuito) :
    filtro === 'rojo'      ? rows.filter(r => r.circuito?.startsWith('rojo')) :
                             rows.filter(r => r.circuito === filtro);

  document.getElementById('s-tot').textContent = rows.length;
  document.getElementById('s-pen').textContent = rows.filter(r => !r.circuito).length;
  document.getElementById('s-ver').textContent = rows.filter(r => r.circuito === 'verde').length;
  document.getElementById('s-nar').textContent = rows.filter(r => r.circuito === 'naranja').length;
  document.getElementById('s-roj').textContent = rows.filter(r => r.circuito?.startsWith('rojo')).length;
  document.getElementById('cnt').textContent   = list.length;

  const tb = document.getElementById('tbody');

  if (!list.length) {
    tb.innerHTML = `<tr><td colspan="5"><div class="empty">— Sin vehículos en esta categoría —</div></td></tr>`;
    return;
  }

  tb.innerHTML = list.map(r => {
    const hora = new Date(r.hora_entrada)
      .toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
    const { cls, lbl } = badgeInfo(r.circuito);

    // Indicador verde pulsante si el conductor tiene la pantalla abierta (tiene_pantalla_abierta)
    const viendo = r.tiene_pantalla_abierta
      ? `<span class="viendo-tag"><div class="viendo-dot"></div>En pantalla</span>` : '';

    return `<tr id="row-${r.id}">
      <td class="td-mat">${r.matricula}</td>
      <td class="td-tel">${r.telefono}</td>
      <td class="td-hora">${hora}</td>
      <td>
        <span class="badge ${cls}">${lbl}</span>${viendo}
      </td>
      <td>
        <div class="acts">
          <button class="ab ab-v" onclick="asignar('${r.id}','verde')">✓ Verde</button>
          <button class="ab ab-n" onclick="asignar('${r.id}','naranja')">⏳ Naranja</button>
          <div class="rwrap">
            <button class="ab ab-r" onclick="togDrop('${r.id}')">🔴 Rojo ▾</button>
            <div class="rdrop" id="d-${r.id}">
              <div class="ri" onclick="asignar('${r.id}','rojo-10')">
                <span class="rh">10:00</span>Inspección mañana
              </div>
              <div class="ri" onclick="asignar('${r.id}','rojo-12')">
                <span class="rh">12:00</span>Inspección mediodía
              </div>
              <div class="ri" onclick="asignar('${r.id}','rojo-14')">
                <span class="rh">14:00</span>Inspección tarde
              </div>
            </div>
          </div>
          <span class="snd" id="snd-${r.id}">aplicando…</span>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function badgeInfo(c) {
  if (!c)             return { cls:'bp', lbl:'● Pendiente' };
  if (c==='verde')    return { cls:'bv', lbl:'✓ Despachado' };
  if (c==='naranja')  return { cls:'bn', lbl:'⏳ Administración' };
  if (c==='rojo-10')  return { cls:'br', lbl:'🔴 Insp. 10:00h' };
  if (c==='rojo-12')  return { cls:'br', lbl:'🔴 Insp. 12:00h' };
  if (c==='rojo-14')  return { cls:'br', lbl:'🔴 Insp. 14:00h' };
  return { cls:'bp', lbl: c };
}

// ── ASIGNAR CIRCUITO ──
async function asignar(id, circuito) {
  closeDrop();
  const snd = document.getElementById(`snd-${id}`);
  if (snd) { snd.textContent = 'aplicando…'; snd.classList.add('show'); }

  const { error } = await sb
    .from('despachos')
    .update({ circuito })
    .eq('id', id);

  if (error) {
    toast('Error al actualizar', 'err');
  } else {
    toast(`Circuito asignado: ${labelCorto(circuito)}`, 'ok');
  }

  if (snd) snd.classList.remove('show');
  // No hace falta llamar a load() — el canal Realtime lo hace automáticamente
}

function labelCorto(c) {
  if (c === 'verde')   return 'Verde · Despachado';
  if (c === 'naranja') return 'Naranja · Administración';
  if (c?.startsWith('rojo')) return 'Rojo · ' + c.split('-')[1] + ':00h';
  return c;
}

// ── FILTROS ──
function setFiltro(f, btn) {
  filtro = f;
  document.querySelectorAll('.fb').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  render();
}

// ── DROPDOWN ──
function togDrop(id) {
  const d = document.getElementById(`d-${id}`);
  const wasOpen = d.classList.contains('open');
  closeDrop();
  if (!wasOpen) { d.classList.add('open'); openDrop = id; }
}

function closeDrop() {
  if (openDrop) {
    document.getElementById(`d-${openDrop}`)?.classList.remove('open');
    openDrop = null;
  }
}

document.addEventListener('click', e => {
  if (!e.target.closest('.rwrap')) closeDrop();
});

// ── TOAST ──
let toastTimer;
function toast(msg, tipo = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast show ${tipo}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
</body>
</html>
