<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel · Despachos Aduaneros</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;900&family=Archivo+Narrow:wght@400;500;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f2ee;--surface:#fff;--border:#e2dfd8;--border2:#eeebe5;
  --text:#1a1816;--muted:#8a8480;
  --sans:'Archivo',sans-serif;--narrow:'Archivo Narrow',sans-serif;
  --v:#15803d;--vbg:#f0fdf4;--vbd:#bbf7d0;
  --n:#b45309;--nbg:#fffbeb;--nbd:#fde68a;
  --r:#b91c1c;--rbg:#fff1f2;--rbd:#fecdd3;
  --p:#4338ca;--pbg:#eef2ff;--pbd:#c7d2fe;
}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
.topbar{background:var(--text);height:52px;display:flex;align-items:center;padding:0 28px;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:200}
.tb-left{display:flex;align-items:center;gap:20px}
.tb-logo{font-family:var(--narrow);font-size:16px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:#f0ede6}
.tb-sep{width:1px;height:18px;background:#303030}
.tb-sub{font-family:var(--narrow);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#555}
.tb-right{display:flex;align-items:center;gap:14px}
.live-badge{display:flex;align-items:center;gap:6px;font-family:var(--narrow);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#4ade80}
.ldot{width:6px;height:6px;background:#4ade80;border-radius:50%;animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.btn-alerta{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:4px;color:#aaa;font-family:var(--narrow);font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;padding:5px 11px;cursor:pointer;transition:all .15s}
.btn-alerta:hover{background:rgba(255,255,255,.15)}
.btn-alerta.activa{color:#4ade80;border-color:rgba(74,222,128,.4)}
.clock{font-family:var(--narrow);font-size:13px;font-weight:600;letter-spacing:.04em;color:#444}
.statsbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex}
.stat{flex:1;padding:14px 20px;border-right:1px solid var(--border2);display:flex;align-items:center;gap:12px}
.stat:last-child{border-right:none}
.stat-stripe{width:3px;height:34px;border-radius:2px;flex-shrink:0}
.stat-num{font-size:36px;font-weight:900;letter-spacing:-.5px;line-height:1;display:block}
.stat-lbl{font-family:var(--narrow);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-top:2px}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px}
.tab{padding:14px 22px;font-family:var(--narrow);font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;margin-bottom:-1px}
.tab:hover{color:var(--text)}.tab.on{color:var(--text);border-bottom-color:var(--text)}
main{flex:1;padding:20px 28px}
.toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.toolbar-left{display:flex;align-items:center;gap:10px}
.toolbar-title{font-family:var(--narrow);font-size:14px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.count-bubble{background:var(--text);color:var(--bg);font-family:var(--narrow);font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px}
.filters{display:flex;gap:4px}
.fb{padding:7px 15px;border:1px solid var(--border);border-radius:4px;background:var(--surface);font-family:var(--narrow);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:all .12s}
.fb:hover{background:var(--bg);color:var(--text)}.fb.on{background:var(--text);color:var(--bg);border-color:var(--text)}
.hist-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.date-input{padding:6px 12px;border:1px solid var(--border);border-radius:4px;background:var(--surface);font-family:var(--narrow);font-size:13px;font-weight:600;color:var(--text);outline:none}
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
table{width:100%;border-collapse:collapse}
thead th{padding:11px 16px;font-family:var(--narrow);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);background:var(--bg);border-bottom:1px solid var(--border);text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--border2);transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf8f4}
tbody tr.archivada{opacity:.45}
tbody tr.archivada .td-mat{text-decoration:line-through;text-decoration-color:var(--v)}
td{padding:15px 16px;vertical-align:middle}
.td-mat{font-family:var(--narrow);font-size:24px;font-weight:700;letter-spacing:.06em}
.td-tel{font-family:var(--narrow);font-size:16px;color:var(--muted);font-weight:500}
.td-hora{font-family:var(--narrow);font-size:16px;color:var(--muted);font-weight:600;letter-spacing:.03em}
.badge{display:inline-flex;align-items:center;gap:5px;padding:5px 13px;border-radius:4px;font-family:var(--narrow);font-size:14px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;border:1px solid;white-space:nowrap}
.bp{color:var(--p);background:var(--pbg);border-color:var(--pbd)}
.bv{color:var(--v);background:var(--vbg);border-color:var(--vbd)}
.bn{color:var(--n);background:var(--nbg);border-color:var(--nbd)}
.br{color:var(--r);background:var(--rbg);border-color:var(--rbd)}
.naranja-timer{display:inline-flex;align-items:center;gap:4px;font-family:var(--narrow);font-size:13px;font-weight:700;color:var(--n);margin-left:7px;background:var(--nbg);border:1px solid var(--nbd);padding:3px 9px;border-radius:3px}
.naranja-timer.warn{color:var(--r);background:var(--rbg);border-color:var(--rbd)}
.viendo-tag{display:inline-flex;align-items:center;gap:4px;font-family:var(--narrow);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#22c55e;margin-left:7px}
.viendo-dot{width:5px;height:5px;background:#22c55e;border-radius:50%;animation:blink 1.8s ease-in-out infinite}
.nuevo-badge{display:inline-flex;align-items:center;font-family:var(--narrow);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#fff;background:#dc2626;border-radius:3px;padding:2px 7px;margin-left:8px;animation:popIn .3s cubic-bezier(.34,1.56,.64,1) both}
@keyframes popIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
.acts{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.ab{padding:8px 14px;border-radius:4px;border:1px solid;font-family:var(--narrow);font-size:13px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:filter .12s,transform .1s;white-space:nowrap}
.ab:hover{filter:brightness(.9)}.ab:active{transform:scale(.97)}
.ab-v{color:var(--v);background:var(--vbg);border-color:var(--vbd)}
.ab-n{color:var(--n);background:var(--nbg);border-color:var(--nbd)}
.ab-r{color:var(--r);background:var(--rbg);border-color:var(--rbd)}
.ab-ok{color:#0f766e;background:#f0fdfa;border-color:#99f6e4}
.ab-call{color:#7c3aed;background:#f5f3ff;border-color:#ddd6fe}
.snd{font-family:var(--narrow);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);opacity:0;transition:opacity .2s;white-space:nowrap}
.snd.show{opacity:1}
.empty{padding:56px 24px;text-align:center;color:var(--muted);font-family:var(--narrow);font-size:13px;font-weight:700;letter-spacing:.08em;text-transform:uppercase}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:320px;box-shadow:0 24px 64px rgba(0,0,0,.2);animation:modalIn .2s cubic-bezier(.22,1,.36,1) both}
@keyframes modalIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.modal-title{font-family:var(--narrow);font-size:14px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--r);margin-bottom:6px}
.modal-mat{font-family:var(--narrow);font-size:22px;font-weight:900;letter-spacing:.08em;color:var(--text);margin-bottom:20px}
.modal-opts{display:flex;flex-direction:column;gap:8px}
.modal-btn{padding:14px 18px;border-radius:8px;border:1px solid var(--rbd);background:var(--rbg);color:var(--r);font-family:var(--narrow);font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:14px;transition:background .12s,transform .1s;text-align:left;width:100%}
.modal-btn:hover{background:#ffe0e3;transform:translateX(2px)}
.modal-btn .mh{font-size:22px;font-weight:900;min-width:60px}
.modal-btn .ml{font-size:12px;font-weight:500;color:var(--muted);display:block;margin-top:1px}
.modal-cancel{margin-top:12px;width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;background:transparent;font-family:var(--narrow);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);cursor:pointer;transition:background .12s}
.modal-cancel:hover{background:var(--bg)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--text);color:#f0ede6;font-family:var(--narrow);font-size:12px;font-weight:700;letter-spacing:.04em;padding:11px 18px;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,.18);transform:translateY(60px);opacity:0;transition:all .28s cubic-bezier(.34,1.56,.64,1);z-index:300;max-width:320px}
.toast.show{transform:translateY(0);opacity:1}.toast.err{background:#991b1b}.toast.ok{background:#166534}
</style>
</head>
<body>

<div class="topbar">
  <div class="tb-left">
    <span class="tb-logo">Despachos Aduaneros</span>
    <div class="tb-sep"></div>
    <span class="tb-sub">Panel de gestión</span>
  </div>
  <div class="tb-right">
    <div class="live-badge"><div class="ldot"></div>Tiempo real</div>
    <button class="btn-alerta" id="btn-alerta" onclick="activarNotificaciones()">🔔 Alertas</button>
    <div class="clock" id="clock">—</div>
  </div>
</div>

<div class="statsbar" id="statsbar">
  <div class="stat"><div class="stat-stripe" style="background:var(--text)"></div><div><span class="stat-num" id="s-tot">0</span><span class="stat-lbl">Total hoy</span></div></div>
  <div class="stat"><div class="stat-stripe" style="background:var(--p)"></div><div><span class="stat-num" style="color:var(--p)" id="s-pen">0</span><span class="stat-lbl">Pendientes</span></div></div>
  <div class="stat"><div class="stat-stripe" style="background:var(--v)"></div><div><span class="stat-num" style="color:var(--v)" id="s-ver">0</span><span class="stat-lbl">Verde · Despachado</span></div></div>
  <div class="stat"><div class="stat-stripe" style="background:var(--n)"></div><div><span class="stat-num" style="color:var(--n)" id="s-nar">0</span><span class="stat-lbl">Naranja · Admin</span></div></div>
  <div class="stat"><div class="stat-stripe" style="background:var(--r)"></div><div><span class="stat-num" style="color:var(--r)" id="s-roj">0</span><span class="stat-lbl">Rojo · Inspección</span></div></div>
</div>

<div class="tabs">
  <div class="tab on" id="tab-hoy"  onclick="cambiarTab('hoy')">Hoy</div>
  <div class="tab"    id="tab-hist" onclick="cambiarTab('hist')">Histórico</div>
</div>

<main>
  <div id="toolbar-hoy" class="toolbar">
    <div class="toolbar-left">
      <span class="toolbar-title">Vehículos del día</span>
      <span class="count-bubble" id="cnt">0</span>
    </div>
    <div class="filters">
      <button class="fb on" onclick="setFiltro('todos',this)">Todos</button>
      <button class="fb"    onclick="setFiltro('pendiente',this)">Pendientes</button>
      <button class="fb"    onclick="setFiltro('verde',this)">Verde</button>
      <button class="fb"    onclick="setFiltro('naranja',this)">Naranja</button>
      <button class="fb"    onclick="setFiltro('rojo',this)">Rojo</button>
      <button class="fb"    onclick="setFiltro('archivado',this)">Archivados</button>
    </div>
  </div>

  <div id="toolbar-hist" class="hist-toolbar" style="display:none">
    <span class="toolbar-title">Fecha</span>
    <input type="date" id="fecha-hist" class="date-input" onchange="cargarHistorico()">
    <span class="count-bubble" id="cnt-hist">0</span>
  </div>

  <div class="tbl-wrap">
    <table>
      <thead>
        <tr>
          <th>Matrícula</th><th>Teléfono</th><th>Entrada</th>
          <th>Circuito</th><th id="th-acc">Asignar circuito</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<div class="modal-overlay" id="modal-rojo" onclick="cerrarModalFuera(event)">
  <div class="modal">
    <div class="modal-title">🔴 Inspección física</div>
    <div class="modal-mat" id="modal-mat">—</div>
    <div class="modal-opts">
      <button class="modal-btn" onclick="confirmarRojo('rojo-10')">
        <span class="mh">10:00</span><span><b>Inspección mañana</b><span class="ml">Turno primera hora</span></span>
      </button>
      <button class="modal-btn" onclick="confirmarRojo('rojo-12')">
        <span class="mh">12:00</span><span><b>Inspección mediodía</b><span class="ml">Turno segunda hora</span></span>
      </button>
      <button class="modal-btn" onclick="confirmarRojo('rojo-14')">
        <span class="mh">14:00</span><span><b>Inspección tarde</b><span class="ml">Turno tercera hora</span></span>
      </button>
    </div>
    <button class="modal-cancel" onclick="document.getElementById('modal-rojo').classList.remove('open')">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://aidkhuhthxtgwseqxejq.supabase.co';
const ANON_KEY     = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFpZGtodWh0aHh0Z3dzZXF4ZWpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTcwMDQsImV4cCI6MjA5MTIzMzAwNH0.9rMXoYgd9OzGYw7mPtRbuPtHZOjubMc8kZ0mSvawUyM';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, ANON_KEY);

// ── ESTADO GLOBAL (todo declarado antes de usarse) ──
var rows            = [];
var filtro          = 'todos';
var tabActual       = 'hoy';
var rojoId          = null;
var rojoMat         = null;
var alertasActivas  = false;
var audioCtx        = null;
var tituloOriginal  = 'Panel · Despachos Aduaneros';
var parpadeoTimer   = null;
var conocidos       = new Set();   // IDs ya vistos
var nuevosIds       = new Set();   // IDs recién llegados (badge NUEVO)

// ── RELOJ ──
setInterval(function() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}, 1000);

// ── AUDIO: activar contexto en primer toque ──
document.addEventListener('click', function() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
});

// ── CARGA + REALTIME ──
function load() {
  var hoy = new Date().toISOString().split('T')[0];
  sb.from('despachos').select('*')
    .gte('hora_entrada', hoy + 'T00:00:00')
    .order('hora_entrada', {ascending: false})
    .then(function(res) {
      var data = res.data || [];
      var esPrimera = conocidos.size === 0;
      nuevosIds.clear();
      data.forEach(function(r) {
        if (!esPrimera && !conocidos.has(r.id)) {
          nuevosIds.add(r.id);
          alertarNueva(r);
          setTimeout(function() { nuevosIds.delete(r.id); }, 30000);
        }
        conocidos.add(r.id);
      });
      rows = data;
      if (tabActual === 'hoy') renderHoy();
    });
}

sb.channel('panel-rt')
  .on('postgres_changes', {event:'*', schema:'public', table:'despachos'}, function() {
    if (tabActual === 'hoy') load();
  })
  .subscribe();

load();

setInterval(function() {
  if (tabActual === 'hoy') actualizarTimers();
}, 60000);

// ── TABS ──
function cambiarTab(tab) {
  tabActual = tab;
  document.getElementById('tab-hoy').classList.toggle('on',  tab === 'hoy');
  document.getElementById('tab-hist').classList.toggle('on', tab === 'hist');
  document.getElementById('toolbar-hoy').style.display  = tab === 'hoy'  ? 'flex' : 'none';
  document.getElementById('toolbar-hist').style.display = tab === 'hist' ? 'flex' : 'none';
  document.getElementById('statsbar').style.display     = tab === 'hoy'  ? 'flex' : 'none';
  document.getElementById('th-acc').style.display       = tab === 'hoy'  ? ''     : 'none';
  if (tab === 'hoy') {
    load();
  } else {
    var ayer = new Date();
    ayer.setDate(ayer.getDate() - 1);
    document.getElementById('fecha-hist').value = ayer.toISOString().split('T')[0];
    cargarHistorico();
  }
}

// ── RENDER HOY ──
function renderHoy() {
  var list;
  if (filtro === 'todos')      list = rows.filter(function(r){ return !r.archivado; });
  else if (filtro==='pendiente') list = rows.filter(function(r){ return !r.circuito && !r.archivado; });
  else if (filtro==='rojo')    list = rows.filter(function(r){ return r.circuito && r.circuito.indexOf('rojo')===0 && !r.archivado; });
  else if (filtro==='archivado') list = rows.filter(function(r){ return r.archivado; });
  else                         list = rows.filter(function(r){ return r.circuito===filtro && !r.archivado; });

  document.getElementById('s-tot').textContent = rows.length;
  document.getElementById('s-pen').textContent = rows.filter(function(r){ return !r.circuito && !r.archivado; }).length;
  document.getElementById('s-ver').textContent = rows.filter(function(r){ return r.circuito==='verde'; }).length;
  document.getElementById('s-nar').textContent = rows.filter(function(r){ return r.circuito==='naranja' && !r.archivado; }).length;
  document.getElementById('s-roj').textContent = rows.filter(function(r){ return r.circuito && r.circuito.indexOf('rojo')===0 && !r.archivado; }).length;
  document.getElementById('cnt').textContent   = list.length;
  renderTabla(list, true);
}

// ── RENDER TABLA ──
function renderTabla(list, conAcc) {
  var tb = document.getElementById('tbody');
  if (!list.length) {
    tb.innerHTML = '<tr><td colspan="5"><div class="empty">— Sin vehículos en esta categoría —</div></td></tr>';
    return;
  }
  var html = '';
  list.forEach(function(r) {
    var hora = new Date(r.hora_entrada).toLocaleTimeString('es-ES', {hour:'2-digit', minute:'2-digit'});
    var bi   = badgeInfo(r.circuito);
    var arch = r.archivado ? 'archivada' : '';

    var timer = '';
    if (r.circuito === 'naranja' && !r.archivado) {
      var mins = minDesde(r.hora_entrada);
      timer = '<span class="naranja-timer' + (mins>=25?' warn':'') + '">' + fmtMin(mins) + '</span>';
    }

    var viendo = r.tiene_pantalla_abierta
      ? '<span class="viendo-tag"><div class="viendo-dot"></div>En pantalla</span>' : '';

    var nuevo = nuevosIds.has(r.id) ? '<span class="nuevo-badge">NUEVO</span>' : '';

    var acc = '';
    if (conAcc && !r.archivado) {
      var extra = '';
      if (r.circuito === 'naranja') {
        extra = '<button class="ab ab-ok" onclick="resolver(\'' + r.id + '\',\'naranja\',\'' + r.matricula + '\')">✓ Autorizado</button>';
      } else if (r.circuito && r.circuito.indexOf('rojo') === 0) {
        extra = '<button class="ab ab-ok" onclick="resolver(\'' + r.id + '\',\'rojo\',\'' + r.matricula + '\')">✓ Inspeccionado</button>';
      }
      acc = '<div class="acts">'
        + '<button class="ab ab-v" onclick="asignar(\'' + r.id + '\',\'verde\',\'' + r.matricula + '\')">✓ Verde</button>'
        + '<button class="ab ab-n" onclick="asignar(\'' + r.id + '\',\'naranja\',\'' + r.matricula + '\')">⏳ Naranja</button>'
        + '<button class="ab ab-r" onclick="abrirRojo(\'' + r.id + '\',\'' + r.matricula + '\')">🔴 Rojo…</button>'
        + extra
        + '<span class="snd" id="snd-' + r.id + '">aplicando…</span>'
        + '</div>';
    } else if (conAcc && r.archivado) {
      acc = '<span style="font-family:var(--narrow);font-size:11px;color:var(--muted)">Archivado</span>';
    }

    html += '<tr class="' + arch + '" id="row-' + r.id + '">'
      + '<td class="td-mat">' + r.matricula + nuevo + '</td>'
      + '<td class="td-tel">' + r.telefono + '</td>'
      + '<td class="td-hora">' + hora + '</td>'
      + '<td><span class="badge ' + bi.cls + '">' + bi.lbl + '</span>' + timer + viendo + '</td>'
      + (conAcc ? '<td>' + acc + '</td>' : '')
      + '</tr>';
  });
  tb.innerHTML = html;
}

function badgeInfo(c) {
  if (!c)              return {cls:'bp', lbl:'● Pendiente'};
  if (c==='verde')     return {cls:'bv', lbl:'✓ Despachado'};
  if (c==='naranja')   return {cls:'bn', lbl:'⏳ Autorización'};
  if (c==='rojo-10')   return {cls:'br', lbl:'🔴 Insp. 10:00h'};
  if (c==='rojo-12')   return {cls:'br', lbl:'🔴 Insp. 12:00h'};
  if (c==='rojo-14')   return {cls:'br', lbl:'🔴 Insp. 14:00h'};
  return {cls:'bp', lbl:c};
}

// ── TIMERS NARANJA ──
function minDesde(iso) { return Math.floor((Date.now() - new Date(iso).getTime()) / 60000); }
function fmtMin(m) { return m < 60 ? m + 'm' : Math.floor(m/60) + 'h ' + (m%60) + 'm'; }

function actualizarTimers() {
  rows.filter(function(r){ return r.circuito==='naranja' && !r.archivado; }).forEach(function(r) {
    var el = document.querySelector('#row-' + r.id + ' .naranja-timer');
    if (!el) return;
    var m = minDesde(r.hora_entrada);
    el.textContent = fmtMin(m);
    el.classList.toggle('warn', m >= 25);
  });
}

// ── MODAL ROJO ──
function abrirRojo(id, mat) {
  rojoId = id; rojoMat = mat;
  document.getElementById('modal-mat').textContent = mat;
  document.getElementById('modal-rojo').classList.add('open');
}
function cerrarModalFuera(e) {
  if (e.target === document.getElementById('modal-rojo'))
    document.getElementById('modal-rojo').classList.remove('open');
}
function confirmarRojo(circuito) {
  document.getElementById('modal-rojo').classList.remove('open');
  asignar(rojoId, circuito, rojoMat);
}

// ── ASIGNAR ──
function asignar(id, circuito, mat) {
  var snd = document.getElementById('snd-' + id);
  if (snd) { snd.textContent = 'aplicando…'; snd.classList.add('show'); }
  var archivado = circuito === 'verde';
  sb.from('despachos').update({circuito: circuito, archivado: archivado}).eq('id', id)
    .then(function(res) {
      if (res.error) { toast('Error al actualizar', 'err'); }
      else { toast(archivado ? '✓ ' + mat + ' despachado y archivado' : 'Circuito: ' + labelCorto(circuito), archivado ? 'ok' : ''); }
      if (snd) snd.classList.remove('show');
    });
}

function resolver(id, tipo, mat) {
  var snd = document.getElementById('snd-' + id);
  if (snd) { snd.textContent = 'archivando…'; snd.classList.add('show'); }
  sb.from('despachos').update({archivado: true}).eq('id', id)
    .then(function(res) {
      if (res.error) { toast('Error al archivar', 'err'); }
      else { toast('✓ ' + mat + (tipo==='naranja' ? ' autorizado' : ' inspeccionado') + ' y archivado', 'ok'); }
      if (snd) snd.classList.remove('show');
    });
}

function labelCorto(c) {
  if (c==='verde')   return 'Verde · Despachado';
  if (c==='naranja') return 'Naranja · Autorización';
  if (c && c.indexOf('rojo')===0) return 'Rojo · ' + c.split('-')[1] + ':00h';
  return c;
}

// ── HISTÓRICO ──
function cargarHistorico() {
  var fecha = document.getElementById('fecha-hist').value;
  if (!fecha) return;
  sb.from('despachos').select('*')
    .gte('hora_entrada', fecha + 'T00:00:00')
    .lt('hora_entrada',  fecha + 'T23:59:59')
    .order('hora_entrada', {ascending: false})
    .then(function(res) {
      var list = res.data || [];
      document.getElementById('cnt-hist').textContent = list.length;
      renderTabla(list, false);
    });
}

// ── FILTROS ──
function setFiltro(f, btn) {
  filtro = f;
  document.querySelectorAll('.fb').forEach(function(b){ b.classList.remove('on'); });
  btn.classList.add('on');
  renderHoy();
}

// ── ALERTAS ──
function activarNotificaciones() {
  if (!('Notification' in window)) { toast('Navegador sin soporte de notificaciones', 'err'); return; }
  if (Notification.permission === 'granted') {
    alertasActivas = true;
    actualizarBtnAlerta();
    toast('Alertas activas', 'ok');
    return;
  }
  Notification.requestPermission().then(function(p) {
    alertasActivas = p === 'granted';
    actualizarBtnAlerta();
    toast(alertasActivas ? 'Alertas activadas' : 'Permiso denegado — solo parpadeo de título', '');
  });
}

function actualizarBtnAlerta() {
  var btn = document.getElementById('btn-alerta');
  if (alertasActivas) { btn.textContent = '🔔 Activas'; btn.classList.add('activa'); }
}

function parpadearTitulo(mat) {
  var n = 0;
  if (parpadeoTimer) clearInterval(parpadeoTimer);
  parpadeoTimer = setInterval(function() {
    document.title = (n % 2 === 0) ? '🚛 ' + mat + ' — NUEVA ENTRADA' : tituloOriginal;
    n++;
    if (n >= 20) { clearInterval(parpadeoTimer); document.title = tituloOriginal; }
  }, 800);
}

function alertarNueva(r) {
  parpadearTitulo(r.matricula);
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    var osc  = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.setValueAtTime(880,  audioCtx.currentTime);
    osc.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.12);
    osc.frequency.setValueAtTime(880,  audioCtx.currentTime + 0.24);
    gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.5);
  } catch(e) {}
  if (alertasActivas && Notification.permission === 'granted') {
    try {
      new Notification('Nueva matrícula registrada', {
        body: r.matricula + ' · ' + r.telefono,
        tag: r.id,
      });
    } catch(e) {}
  }
}

// Auto-activar si ya hay permiso
if (Notification.permission === 'granted') {
  alertasActivas = true;
  actualizarBtnAlerta();
}

// ── LLAMAR A MOSTRADOR ──
function llamarMostrador(id, mat) {
  sb.from('despachos')
    .update({ mensaje_mostrador: true })
    .eq('id', id)
    .then(function(res) {
      if (res.error) { toast('Error al enviar aviso', 'err'); }
      else {
        toast('📢 Aviso enviado a ' + mat, 'ok');
        // Resetear tras 60 segundos para poder volver a enviar
        setTimeout(function() {
          sb.from('despachos').update({ mensaje_mostrador: false }).eq('id', id);
        }, 60000);
      }
    });
}

// ── TOAST ──
var toastTimer;
function toast(msg, tipo) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (tipo ? ' ' + tipo : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 3500);
}
</script>
